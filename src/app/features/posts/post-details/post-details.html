<div class="page-container">
  @if (loading()) {
    <div class="card">Loading post...</div>
  } @else if (errorMessage()) {
    <div class="card error-box">{{ errorMessage() }}</div>
  } @else if (post()) {
    <div class="card post-details">
      <h1>{{ post()!.title }}</h1>

      <p class="meta text-muted">
        By {{ post()!.authorName || ('User #' + post()!.userId) }}
      </p>

      <div class="content">
        {{ post()!.content }}
      </div>

      <div class="actions">
        <a routerLink="/posts" class="btn btn-secondary">Back</a>
        <a [routerLink]="['/posts/edit', post()!.id]" class="btn btn-primary">Edit</a>
        <button class="btn btn-danger" (click)="onDelete()">Delete</button>
      </div>      
    </div>

    <app-comment-section [postId]="post()!.id!"></app-comment-section>
  }
</div>
